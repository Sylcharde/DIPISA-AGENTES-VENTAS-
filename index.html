<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Ventas — Dipisa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
--bg:#f4f4f2;--surface:#fff;--surface2:#f0efeb;--surface3:#e8e7e3;
--text:#1a1a18;--text2:#6b6a65;--text3:#9c9b95;
--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
--green:#16a34a;--green-bg:#dcfce7;--green-border:#22c55e;
--blue:#2563eb;--blue-bg:#dbeafe;--blue-border:#60a5fa;
--orange:#ea580c;--orange-bg:#fff7ed;--orange-border:#fb923c;
--purple:#9333ea;--purple-bg:#f3e8ff;--purple-border:#a855f7;
--red:#dc2626;--red-bg:#fef2f2;--red-border:#f87171;
--teal:#0d9488;--teal-bg:#f0fdfa;--teal-border:#2dd4bf;
--amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fbbf24;
--sidebar-w:230px;--radius:10px;--radius-lg:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* Upload */
.upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;gap:1.5rem}
.upload-screen h1{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.upload-screen p{color:var(--text2);font-size:14px;max-width:480px;text-align:center;line-height:1.6}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:560px}
.upload-card{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:2rem 1.5rem;cursor:pointer;transition:all 0.2s;background:var(--surface);text-align:center}
.upload-card:hover{border-color:var(--blue);background:var(--blue-bg)}
.upload-card.loaded{border:2px solid var(--green-border);background:var(--green-bg)}
.upload-card .icon{font-size:32px;margin-bottom:6px}
.upload-card .label{font-size:14px;font-weight:600}
.upload-card .hint{font-size:11px;color:var(--text3);margin-top:2px}
.upload-card .fname{font-size:11px;color:var(--green);font-weight:500;margin-top:6px;word-break:break-all}
.upload-card input{display:none}
.btn-start{padding:12px 36px;font-size:15px;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font);display:none}
.btn-start.show{display:inline-block}

/* Layout */
#dashboard{display:none}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar .logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar .logo h2{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.sidebar .logo span{font-size:11px;color:var(--text3)}
.nav-group{padding:12px 12px 4px}
.nav-group-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.nav-item .nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item .nav-label{flex:1}
.sidebar-footer{padding:12px;margin-top:auto;border-top:1px solid var(--border)}
.sidebar-footer button{width:100%;padding:8px;font-size:12px;border:1px solid var(--border2);border-radius:8px;background:none;cursor:pointer;color:var(--text2);font-family:var(--font)}
.sidebar-footer button:hover{background:var(--surface2)}

/* Main content */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5}
.top-bar .file-pills{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.file-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.file-pill.green{background:var(--green-bg);color:var(--green)}.file-pill.blue{background:var(--blue-bg);color:var(--blue)}
.file-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.ctrl-group select{padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;cursor:pointer}

/* Multi-select dropdown */
.multi-select{position:relative;min-width:140px}
.multi-select .ms-btn{padding:5px 28px 5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;width:100%;text-align:left;position:relative}
.multi-select .ms-btn::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3)}
.multi-select .ms-panel{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:20;min-width:180px;max-height:260px;overflow-y:auto;padding:4px 0}
.multi-select.open .ms-panel{display:block}
.multi-select .ms-item{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;cursor:pointer;transition:background 0.1s}
.multi-select .ms-item:hover{background:var(--surface2)}
.multi-select .ms-item input{accent-color:var(--blue);cursor:pointer}
.multi-select .ms-item.all{border-bottom:1px solid var(--border);margin-bottom:2px;font-weight:600}
.multi-select .ms-count{display:inline-flex;align-items:center;justify-content:center;background:var(--blue);color:#fff;border-radius:10px;font-size:9px;font-weight:700;min-width:16px;height:16px;padding:0 4px;margin-left:4px}
.btn-sm{padding:5px 14px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:var(--font)}
.btn-sm.primary{background:var(--blue);color:#fff}.btn-sm.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-sm.speaking{background:var(--blue-bg);color:var(--blue)}

.content{padding:24px 28px;max-width:1000px}
.page-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:20px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.kpi-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px 18px}
.kpi-card .lbl{font-size:11px;color:var(--text2)}
.kpi-card .val{font-size:22px;font-weight:700;letter-spacing:-0.8px;font-family:var(--mono);margin-top:4px}
.kpi-card .sub{font-size:11px;color:var(--text3);margin-top:2px}
.kpi-card.blue{border:2px dashed var(--blue-border)}.kpi-card.blue .val{color:var(--blue)}
.kpi-card.green{border:2px solid var(--green-border)}.kpi-card.green .val{color:var(--green)}
.kpi-card.orange{border:2px dashed var(--orange-border)}.kpi-card.orange .val{color:var(--orange)}
.kpi-card.purple{border:2px dashed var(--purple-border)}.kpi-card.purple .val{color:var(--purple)}

/* Exec cards */
.exec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.exec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;position:relative;overflow:hidden}
.exec-card .stripe{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.exec-card .ec-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-left:8px}
.exec-card .ec-val{font-size:24px;font-weight:700;font-family:var(--mono);margin:4px 0 2px 8px}
.exec-card .ec-sub{font-size:11px;color:var(--text2);margin-left:8px}

/* Progress */
.progress-wrap{margin:8px 0}
.progress-bar{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:6px;transition:width 0.4s}
.progress-label{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;font-weight:600;line-height:12px;color:var(--text)}

/* Tables */
.data-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow-x:auto}
.data-section .title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:14px 18px 10px}
table.dt{width:100%;border-collapse:collapse}
table.dt th{text-align:left;padding:8px 16px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);background:var(--surface2)}
table.dt td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px}
table.dt tr:last-child td{border-bottom:none}
table.dt .num{text-align:right;font-family:var(--mono);font-size:12px}
table.dt .total-row{font-weight:700;background:var(--surface2)}
table.dt .total-row td{border-top:2px solid var(--border2)}

.badge{display:inline-block;padding:2px 10px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.green{background:var(--green-bg);color:var(--green)}.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.orange{background:var(--orange-bg);color:var(--orange)}.badge.purple{background:var(--purple-bg);color:var(--purple)}
.badge.red{background:var(--red-bg);color:var(--red)}.badge.teal{background:var(--teal-bg);color:var(--teal)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}

.bar-cell{display:flex;align-items:center;gap:6px}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.bar-fill.green{background:var(--green)}.bar-fill.blue{background:var(--blue)}.bar-fill.orange{background:var(--orange)}
.bar-fill.purple{background:var(--purple)}.bar-fill.red{background:var(--red)}.bar-fill.teal{background:var(--teal)}.bar-fill.amber{background:var(--amber)}
.bar-pct{font-size:11px;font-weight:600;color:var(--text2);min-width:38px;text-align:right}

.alert-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.alert-badge.red{background:var(--red-bg);color:var(--red)}.alert-badge.amber{background:var(--amber-bg);color:var(--amber)}
.alert-badge.green{background:var(--green-bg);color:var(--green)}.alert-badge.blue{background:var(--blue-bg);color:var(--blue)}
.alert-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.alert-dot.red{background:var(--red)}.alert-dot.amber{background:var(--amber)}.alert-dot.green{background:var(--green)}

.heatmap-cell{padding:8px 6px;text-align:center;border-radius:5px;font-size:11px;font-weight:600}
.heat-0{background:var(--surface2);color:var(--text3)}.heat-1{background:#dcfce7;color:#166534}.heat-2{background:#bbf7d0;color:#166534}
.heat-3{background:#86efac;color:#14532d}.heat-4{background:#4ade80;color:#14532d}.heat-5{background:#22c55e;color:#fff}

.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}

/* Mobile */
@media(max-width:800px){
  .sidebar{width:100%;position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:12px 0}
  .nav-group{display:flex;flex-wrap:wrap;gap:2px;padding:4px 8px}
  .nav-group-label{display:none}
  .nav-item{padding:6px 10px;font-size:11px}
  .nav-item .nav-icon{display:none}
  .main{margin-left:0}
  .layout{flex-direction:column}
  .content{padding:16px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .exec-grid{grid-template-columns:1fr}
  .sidebar .logo{padding:0 12px 10px}
  .sidebar-footer{display:none}
  .upload-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="uploadScreen" class="upload-screen">
  <h1>Agente de ventas Dipisa</h1>
  <p>Sube tus archivos de NetSuite para analizar facturación, pipeline y proyección de ventas</p>
  <div class="upload-grid">
    <div class="upload-card" id="cardSabana" onclick="document.getElementById('fileSabana').click()">
      <div class="icon">&#128200;</div>
      <div class="label">Sabana Venta</div>
      <div class="hint">Facturas y NC</div>
      <div class="fname" id="fnameSabana"></div>
      <input type="file" id="fileSabana" accept=".xls,.xlsx,.xml" />
    </div>
    <div class="upload-card" id="cardOV" onclick="document.getElementById('fileOV').click()">
      <div class="icon">&#128203;</div>
      <div class="label">Órdenes de Venta</div>
      <div class="hint">Pipeline activo</div>
      <div class="fname" id="fnameOV"></div>
      <input type="file" id="fileOV" accept=".xls,.xlsx,.xml" />
    </div>
  </div>
  <button class="btn-start" id="btnStart" onclick="startAnalysis()">Analizar</button>
</div>

<div id="dashboard" class="layout">
  <nav class="sidebar">
    <div class="logo"><h2>Dipisa Ventas</h2><span>Agente de análisis</span></div>
    <div class="nav-group">
      <div class="nav-group-label">General</div>
      <button class="nav-item active" onclick="nav('ejecutivo',this)"><span class="nav-icon">&#9673;</span><span class="nav-label">Resumen ejecutivo</span></button>
      <button class="nav-item" onclick="nav('meta',this)"><span class="nav-icon">&#9898;</span><span class="nav-label">Meta y ritmo</span></button>
      <button class="nav-item" onclick="nav('alertas',this)"><span class="nav-icon">&#9888;</span><span class="nav-label">Alertas</span></button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">Facturación</div>
      <button class="nav-item" onclick="nav('bodega',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Por bodega</span></button>
      <button class="nav-item" onclick="nav('vendedor',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Por vendedor</span></button>
      <button class="nav-item" onclick="nav('clase',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Por clase</span></button>
      <button class="nav-item" onclick="nav('mes',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Mensual</span></button>
      <button class="nav-item" onclick="nav('clientes',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Top clientes</span></button>
      <button class="nav-item" onclick="nav('nc',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Notas de crédito</span></button>
      <button class="nav-item" onclick="nav('departamento',this)"><span class="nav-icon">&#9642;</span><span class="nav-label">Departamento</span></button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">Análisis</div>
      <button class="nav-item" onclick="nav('comparativo',this)"><span class="nav-icon">&#8596;</span><span class="nav-label">Comparativo</span></button>
      <button class="nav-item" onclick="nav('pareto',this)"><span class="nav-icon">&#9650;</span><span class="nav-label">Pareto clientes</span></button>
      <button class="nav-item" onclick="nav('ticket',this)"><span class="nav-icon">&#9632;</span><span class="nav-label">Ticket promedio</span></button>
      <button class="nav-item" onclick="nav('margenProm',this)"><span class="nav-icon">&#9644;</span><span class="nav-label">Margen vs prom.</span></button>
      <button class="nav-item" onclick="nav('mix',this)"><span class="nav-icon">&#9638;</span><span class="nav-label">Mix producto</span></button>
      <button class="nav-item" onclick="nav('heatmap',this)"><span class="nav-icon">&#9608;</span><span class="nav-label">Heatmap semanal</span></button>
      <button class="nav-item" onclick="nav('crecimiento',this)"><span class="nav-icon">&#9650;</span><span class="nav-label">Crecimiento</span></button>
      <button class="nav-item" onclick="nav('nuevosRec',this)"><span class="nav-icon">&#9679;</span><span class="nav-label">Nuevos vs recurrentes</span></button>
      <button class="nav-item" onclick="nav('rentKilo',this)"><span class="nav-icon">&#9674;</span><span class="nav-label">Rentabilidad / kg</span></button>
    </div>
    <div class="nav-group" id="navPipeline" style="display:none">
      <div class="nav-group-label">Pipeline</div>
      <button class="nav-item" onclick="nav('estado',this)"><span class="nav-icon">&#9670;</span><span class="nav-label">Detalle estado</span></button>
      <button class="nav-item" onclick="nav('pipelineBod',this)"><span class="nav-icon">&#9670;</span><span class="nav-label">Pipe por bodega</span></button>
      <button class="nav-item" onclick="nav('pipelineVend',this)"><span class="nav-icon">&#9670;</span><span class="nav-label">Pipe por vendedor</span></button>
    </div>
    <div class="sidebar-footer">
      <button onclick="resetApp()">&#8635; Nuevo archivo</button>
    </div>
  </nav>

  <div class="main">
    <div class="top-bar">
      <div class="file-pills" id="filePills"></div>
      <div class="ctrl-group"><label>Período</label><select id="fPeriodo" onchange="onPeriodoChange()"></select></div>
      <div class="ctrl-group" id="mesGroup" style="display:none"><label>Mes</label><select id="fMesDia" onchange="onMesDiaChange()"></select></div>
      <div class="ctrl-group" id="diaGroup" style="display:none"><label>Día</label><select id="fDia"></select></div>
      <div class="ctrl-group"><label>Bodega</label><div class="multi-select" id="msBodega"><button class="ms-btn" onclick="toggleMS('msBodega')">Todas</button><div class="ms-panel"></div></div></div>
      <div class="ctrl-group"><label>Clase</label><div class="multi-select" id="msClase"><button class="ms-btn" onclick="toggleMS('msClase')">Todas</button><div class="ms-panel"></div></div></div>
      <button class="btn-sm primary" onclick="runAnalysis()">Analizar</button>
      <button class="btn-sm secondary" id="btnEsc" onclick="toggleSpeak()">&#128265; Escuchar</button>
      <button class="btn-sm secondary" onclick="downloadCSV()">&#11015; Excel</button>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
let sabanaData=[],ovData=[],filteredSabana=[],filteredOV=[];
let sabanaFile='',ovFile='';
let sabanaStats={},ovStats={},isSpeaking=false,currentTab='ejecutivo';

const fmt=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
const fmtN=n=>new Intl.NumberFormat('es-CL').format(Math.round(n));
const pct=(n,t)=>t>0?(n/t*100).toFixed(1)+'%':'0%';
const mesNames={'01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'};
const mesLabel=m=>(mesNames[m.substring(5)]||m)+' '+m.substring(0,4);
const mesShort=m=>{const s={'01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};return(s[m.substring(5)]||m)+' '+m.substring(0,4)};
const badgeColors=['green','blue','orange','purple','teal','amber','red'];
const estadoBadge={'Aprobación pendiente':'amber','Ejecución de la orden pendiente':'blue','Facturación pendiente':'green','Facturación pendiente/parcialmente ejecutada':'teal','Parcialmente ejecutada':'orange','Facturada':'green','Cerrada':'purple','Cancelada':'red'};
const metasMensuales={'01':5816000000,'02':5241000000,'03':6671000000,'04':6066000000,'05':6454000000,'06':6392000000,'07':6687000000,'08':6442000000,'09':6308000000,'10':7072000000,'11':7280000000,'12':6524000000};

function normUbic(u){if(u.includes('AEROPARQUE'))return'Aeroparque';if(u.includes('QUILICURA'))return'Quilicura';if(u.includes('Concepción'))return'Concepción';if(u.includes('SAN FRANCISCO'))return'San Francisco';if(u.includes('EDI'))return'EDI';if(u.includes('INSUMOS'))return'Insumos';if(u.includes('MAQUILADORES'))return'Maquiladores';if(u.includes('LOGISTICA'))return'Log. Inversa';if(u.includes('PACKAGING')||u.includes('PTA'))return'Packaging';if(u.includes('CALIDAD'))return'Calidad';if(u==='Casa Matriz (Dipisa)')return'Casa Matriz';return u;}
function parseMeta(){const per=document.getElementById('fPeriodo').value;if(per==='all')return 0;if(per==='mes'||per==='dia'){const m=document.getElementById('fMesDia').value;return metasMensuales[m.substring(5)]||0;}return 0;}
function metaForMonth(mes){return metasMensuales[mes.substring(5)]||0;}
function diasHabilesRestantes(){const now=new Date();const y=now.getFullYear();const m=now.getMonth();const lastDay=new Date(y,m+1,0).getDate();let count=0;for(let d=now.getDate()+1;d<=lastDay;d++){const dt=new Date(y,m,d);const dow=dt.getDay();if(dow!==0&&dow!==6)count++;}return count;}

function parseSabana(text){const parser=new DOMParser(),xml=parser.parseFromString(text,'text/xml');const ns='urn:schemas-microsoft-com:office:spreadsheet';const rows=xml.getElementsByTagNameNS(ns,'Row');const data=[];const hCells=rows[6]?.getElementsByTagNameNS(ns,'Cell')||[];const headers=[];for(const c of hCells){const d=c.getElementsByTagNameNS(ns,'Data')[0];headers.push(d?d.textContent:'');}const cm={};headers.forEach((h,i)=>cm[h]=i);for(let r=7;r<rows.length;r++){const cells=rows[r].getElementsByTagNameNS(ns,'Cell');const vals={};let idx=0;for(const cell of cells){const ia=cell.getAttribute('ss:Index');if(ia)idx=parseInt(ia)-1;const d=cell.getElementsByTagNameNS(ns,'Data')[0];vals[idx]=d?d.textContent:'';idx++;}const tipo=vals[cm['Tipo de transacción']]||'';if(!tipo||tipo==='Total')continue;const ubicRaw=vals[cm['Ubicación']]||'';if(ubicRaw==='Total'||ubicRaw.includes('Nº Ubicación'))continue;const fechaRaw=vals[cm['Fecha']]||'';data.push({ubicacion:normUbic(ubicRaw),cliente:vals[cm['Cliente:Trabajo']]||'',vendedor:(vals[cm['Representante de ventas principal: Nombre']]||'').replace(' [DIPISA]',''),tipo,fecha:fechaRaw,mes:fechaRaw?fechaRaw.substring(0,7):'',dia:fechaRaw?fechaRaw.substring(0,10):'',folio:vals[cm['Folio SII']]||'',clase:(vals[cm['Clase']]||'').replace(' [Dipisa]',''),departamento:vals[cm['Departamento']]||'',ingresos:parseFloat(vals[cm['Ingresos totales']]||0),costo:parseFloat(vals[cm['Costo Total']]||0),ganancia:parseFloat(vals[cm['Ganancia $']]||0),kilos:parseFloat(vals[cm['Kilos Venta']]||0)});}return data;}
function parseOV(text){const parser=new DOMParser(),xml=parser.parseFromString(text,'text/xml');const ns='urn:schemas-microsoft-com:office:spreadsheet';const rows=xml.getElementsByTagNameNS(ns,'Row');const data=[];const hCells=rows[0]?.getElementsByTagNameNS(ns,'Cell')||[];const headers=[];for(const c of hCells){const d=c.getElementsByTagNameNS(ns,'Data')[0];headers.push(d?d.textContent:'');}const cm={};headers.forEach((h,i)=>cm[h]=i);for(let r=1;r<rows.length;r++){const cells=rows[r].getElementsByTagNameNS(ns,'Cell');const vals={};let idx=0;for(const cell of cells){const ia=cell.getAttribute('ss:Index');if(ia)idx=parseInt(ia)-1;const d=cell.getElementsByTagNameNS(ns,'Data')[0];vals[idx]=d?d.textContent:'';idx++;}const estado=vals[cm['Estado']]||'';if(!estado)continue;const ubicRaw=vals[cm['Ubicación']]||'';const fechaRaw=vals[cm['Fecha Compro.']]||vals[cm['Fecha']]||'';data.push({ubicacion:normUbic(ubicRaw),cliente:vals[cm['Nombre']]||'',vendedor:(vals[cm['Representante de ventas']]||'').replace(' [DIPISA]',''),estado,fecha:fechaRaw,mes:fechaRaw?fechaRaw.substring(0,7):'',dia:fechaRaw?fechaRaw.substring(0,10):'',nroDoc:vals[cm['Nro. Doc.']]||'',clase:(vals[cm['Clase']]||'').replace(' [Dipisa]',''),departamento:vals[cm['Departamento']]||'',importe:parseFloat(vals[cm['Importe']]||0),peso:parseFloat(vals[cm['3K - Peso']]||0),cantidad:parseFloat(vals[cm['Cantidad']]||0),ejecucion:parseFloat(vals[cm['Ejecución']]||0)});}return data;}

function computeSabanaStats(data){const fv=data.filter(d=>d.tipo==='Factura de venta'),nc=data.filter(d=>d.tipo==='Nota de crédito');const totalIng=fv.reduce((s,d)=>s+d.ingresos,0),totalNC=nc.reduce((s,d)=>s+Math.abs(d.ingresos),0);const totalCosto=fv.reduce((s,d)=>s+d.costo,0),totalGan=fv.reduce((s,d)=>s+d.ganancia,0);const totalKilos=fv.reduce((s,d)=>s+d.kilos,0);const nFolios=new Set(fv.map(d=>d.folio)).size,nNC=new Set(nc.map(d=>d.folio)).size;const group=(arr,key)=>{const m={};arr.forEach(d=>{const k=d[key]||'(sin dato)';if(!m[k])m[k]={ingresos:0,costo:0,ganancia:0,kilos:0,folios:new Set(),lineas:0};m[k].ingresos+=d.ingresos;m[k].costo+=d.costo;m[k].ganancia+=d.ganancia;m[k].kilos+=d.kilos;m[k].folios.add(d.folio);m[k].lineas++;});return Object.entries(m).map(([k,v])=>({name:k,ingresos:v.ingresos,costo:v.costo,ganancia:v.ganancia,kilos:v.kilos,folios:v.folios.size,lineas:v.lineas,margen:v.ingresos>0?v.ganancia/v.ingresos*100:0})).sort((a,b)=>b.ingresos-a.ingresos);};return{totalIng,totalNC,totalCosto,totalGan,totalKilos,margen:totalIng>0?totalGan/totalIng*100:0,nFolios,nNC,ventaNeta:totalIng-totalNC,nLineas:fv.length,nLineasNC:nc.length,byBodega:group(fv,'ubicacion'),byVendedor:group(fv,'vendedor'),byClase:group(fv,'clase'),byDepto:group(fv,'departamento'),byMes:group(fv,'mes').sort((a,b)=>a.name.localeCompare(b.name)),byCliente:group(fv,'cliente'),byBodegaNC:group(nc,'ubicacion'),byVendedorNC:group(nc,'vendedor')};}
function computeOVStats(data){const pipeStates=['Aprobación pendiente','Ejecución de la orden pendiente','Facturación pendiente','Parcialmente ejecutada','Facturación pendiente/parcialmente ejecutada'];const pipeline=data.filter(d=>pipeStates.includes(d.estado));const facturada=data.filter(d=>d.estado==='Facturada');const totalPipe=pipeline.reduce((s,d)=>s+d.importe,0);const totalFact=facturada.reduce((s,d)=>s+d.importe,0);const tonPipe=pipeline.reduce((s,d)=>s+d.peso,0);const tonFact=facturada.reduce((s,d)=>s+d.peso,0);const nPipe=new Set(pipeline.map(d=>d.nroDoc)).size;const nFact=new Set(facturada.map(d=>d.nroDoc)).size;const byEstado={};pipeline.forEach(d=>{const e=d.estado;if(!byEstado[e])byEstado[e]={importe:0,peso:0,docs:new Set(),lineas:0};byEstado[e].importe+=d.importe;byEstado[e].peso+=d.peso;byEstado[e].docs.add(d.nroDoc);byEstado[e].lineas++;});const estadoArr=Object.entries(byEstado).map(([k,v])=>({name:k,importe:v.importe,peso:v.peso,docs:v.docs.size,lineas:v.lineas})).sort((a,b)=>b.importe-a.importe);const group=(arr,key)=>{const m={};arr.forEach(d=>{const k=d[key]||'(sin dato)';if(!m[k])m[k]={importe:0,peso:0,docs:new Set()};m[k].importe+=d.importe;m[k].peso+=d.peso;m[k].docs.add(d.nroDoc);});return Object.entries(m).map(([k,v])=>({name:k,importe:v.importe,peso:v.peso,docs:v.docs.size})).sort((a,b)=>b.importe-a.importe);};return{totalPipe,totalFact,tonPipe,tonFact,nPipe,nFact,byEstado:estadoArr,byBodega:group(pipeline,'ubicacion'),byVendedor:group(pipeline,'vendedor'),byClase:group(pipeline,'clase')};}

    const allPrev=new Set();meses.forEach((m,i)=>{const fvM=sabanaData.filter(d=>d.tipo==='Factura de venta'&&d.mes===m);const cliM=new Set(fvM.map(d=>d.cliente));let nuevos=0,ingN=0;cliM.forEach(c=>{if(!allPrev.has(c)){nuevos++;ingN+=fvM.filter(d=>d.cliente===c).reduce((s,d)=>s+d.ingresos,0);}});const rec=cliM.size-nuevos;html+=`<tr><td><span class="badge ${badgeColors[i%7]}">${mesShort(m)}</span></td><td class="num">${fmtN(cliM.size)}</td><td class="num"><span class="alert-badge blue">${fmtN(nuevos)}</span></td><td class="num">${fmtN(rec)}</td><td class="num">${(cliM.size>0?(nuevos/cliM.size*100):0).toFixed(1)}%</td><td class="num">${fmt(ingN)}</td></tr>`;cliM.forEach(c=>allPrev.add(c));});html+=`</table></div>`;
  }
  else if(currentTab==='rentKilo'){html+=makeTable('Por bodega',[{label:'Bodega'},{label:'Ganancia',num:1},{label:'Kilos',num:1},{label:'$/Kilo',num:1},{label:'Margen',num:1}],ss.byBodega.filter(b=>b.kilos>0).map((b,i)=>[`<span class="badge ${badgeColors[i%7]}">${b.name}</span>`,fmt(b.ganancia),fmtN(b.kilos),fmt(b.ganancia/b.kilos),Math.round(b.margen)+'%']))+makeTable('Por clase',[{label:'Clase'},{label:'Ganancia',num:1},{label:'Kilos',num:1},{label:'$/Kilo',num:1}],ss.byClase.filter(c=>c.kilos>0).map((c,i)=>[`<span class="badge ${badgeColors[i%7]}">${c.name}</span>`,fmt(c.ganancia),fmtN(c.kilos),fmt(c.ganancia/c.kilos)]))+makeTable('Por vendedor',[{label:'Vendedor'},{label:'Ganancia',num:1},{label:'Kilos',num:1},{label:'$/Kilo',num:1}],ss.byVendedor.filter(v=>v.kilos>0).map((v,i)=>[`<span class="badge ${badgeColors[i%7]}">${v.name}</span>`,fmt(v.ganancia),fmtN(v.kilos),fmt(v.ganancia/v.kilos)]));}
  else if(currentTab==='estado'){html+=makeTable('',[{label:'Estado'},{label:'OVs',num:1},{label:'Toneladas',num:1},{label:'Monto',num:1},{label:'Peso',w:'130px'}],os.byEstado.map(e=>{const c=estadoBadge[e.name]||'blue';return[`<span class="badge ${c}">${e.name}</span>`,fmtN(e.docs),(e.peso/1000).toFixed(1)+' ton',fmt(e.importe),barCol(e.importe,os.totalPipe,c)];}));}
  else if(currentTab==='pipelineBod'){html+=makeTable('',[{label:'Bodega'},{label:'OVs',num:1},{label:'Monto',num:1},{label:'Ton.',num:1},{label:'Peso',w:'130px'}],os.byBodega.map((b,i)=>[`<span class="badge ${badgeColors[i%7]}">${b.name}</span>`,fmtN(b.docs),fmt(b.importe),(b.peso/1000).toFixed(1),barCol(b.importe,os.totalPipe,badgeColors[i%7])]));}
  else if(currentTab==='pipelineVend'){html+=makeTable('',[{label:'Vendedor'},{label:'OVs',num:1},{label:'Monto',num:1},{label:'Peso',w:'130px'}],os.byVendedor.map((v,i)=>[`<span class="badge ${badgeColors[i%7]}">${v.name}</span>`,fmtN(v.docs),fmt(v.importe),barCol(v.importe,os.totalPipe,badgeColors[i%7])]));}

  el.innerHTML=html;
}

// KPIs above content
function renderKPIs(){
  const ss=sabanaStats,os=ovStats,label=getLabel();let h='';
  if(sabanaData.length&&ovData.length){const proy=ss.ventaNeta+os.totalPipe;h+=`<div class="section-label">PROYECCIÓN · ${label}</div><div class="kpi-row"><div class="kpi-card purple"><div class="lbl">Venta neta</div><div class="val">${fmt(ss.ventaNeta)}</div><div class="sub">${pct(ss.ventaNeta,proy)} del total</div></div><div class="kpi-card purple"><div class="lbl">Pipeline</div><div class="val">${fmt(os.totalPipe)}</div><div class="sub">${pct(os.totalPipe,proy)} pendiente</div></div><div class="kpi-card purple"><div class="lbl">Proyección total</div><div class="val">${fmt(proy)}</div></div></div>`;}
  if(sabanaData.length){h+=`<div class="section-label">FACTURACIÓN · ${label}</div><div class="kpi-row"><div class="kpi-card green"><div class="lbl">Facturas</div><div class="val">${fmtN(ss.nFolios)}</div></div><div class="kpi-card green"><div class="lbl">Ingresos</div><div class="val">${fmt(ss.totalIng)}</div></div><div class="kpi-card green"><div class="lbl">Ganancia</div><div class="val">${fmt(ss.totalGan)}</div></div><div class="kpi-card green"><div class="lbl">Margen</div><div class="val">${Math.round(ss.margen)}%</div></div></div><div class="kpi-row"><div class="kpi-card orange"><div class="lbl">NC</div><div class="val">${fmtN(ss.nNC)}</div></div><div class="kpi-card orange"><div class="lbl">Monto NC</div><div class="val">${fmt(ss.totalNC)}</div></div><div class="kpi-card orange"><div class="lbl">Venta neta</div><div class="val">${fmt(ss.ventaNeta)}</div></div></div>`;}
  if(ovData.length){h+=`<div class="section-label">PIPELINE · ${label}</div><div class="kpi-row"><div class="kpi-card blue"><div class="lbl">OVs pipeline</div><div class="val">${fmtN(os.nPipe)}</div></div><div class="kpi-card blue"><div class="lbl">Monto</div><div class="val">${fmt(os.totalPipe)}</div></div><div class="kpi-card blue"><div class="lbl">Ton. pipeline</div><div class="val">${(os.tonPipe/1000).toFixed(1)} ton</div></div></div>`;}
  return h;
}

function runAnalysis(){applyFilters();sabanaStats=computeSabanaStats(filteredSabana);ovStats=computeOVStats(filteredOV);renderTab();}
function resetApp(){window.speechSynthesis?.cancel();isSpeaking=false;sabanaData=[];ovData=[];document.getElementById('dashboard').style.display='none';document.getElementById('uploadScreen').style.display='flex';document.getElementById('fileSabana').value='';document.getElementById('fileOV').value='';document.getElementById('cardSabana').classList.remove('loaded');document.getElementById('cardOV').classList.remove('loaded');document.getElementById('fnameSabana').textContent='';document.getElementById('fnameOV').textContent='';document.getElementById('btnStart').classList.remove('show');}

function toggleSpeak(){const btn=document.getElementById('btnEsc');if(isSpeaking){window.speechSynthesis?.cancel();isSpeaking=false;btn.classList.remove('speaking');btn.innerHTML='&#128265; Escuchar';return;}const ss=sabanaStats,os=ovStats;let t=`Reporte Dipisa. `;if(sabanaData.length)t+=`Venta neta: ${fmt(ss.ventaNeta)}, margen ${Math.round(ss.margen)}%. `;if(ovData.length)t+=`Pipeline: ${fmt(os.totalPipe)}. `;if(ovData.length&&sabanaData.length)t+=`Proyección: ${fmt(ss.ventaNeta+os.totalPipe)}. `;if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.substring(0,600));u.lang='es-CL';u.rate=1.05;const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));if(v)u.voice=v;u.onend=()=>{isSpeaking=false;btn.classList.remove('speaking');btn.innerHTML='&#128265; Escuchar';};window.speechSynthesis.speak(u);isSpeaking=true;btn.classList.add('speaking');btn.innerHTML='&#128263; Detener';}
if(window.speechSynthesis)window.speechSynthesis.getVoices();

function downloadCSV(){
  const sep=';';const label=getLabel();
  let csv='REPORTE DIPISA - '+label+'\n\n';
  // Facturación por bodega
  if(sabanaData.length){
    csv+='FACTURACIÓN POR BODEGA\n';
    csv+='Bodega'+sep+'Facturas'+sep+'Ingresos'+sep+'Costo'+sep+'Ganancia'+sep+'Margen\n';
    sabanaStats.byBodega.forEach(b=>{csv+=b.name+sep+b.folios+sep+Math.round(b.ingresos)+sep+Math.round(b.costo)+sep+Math.round(b.ganancia)+sep+Math.round(b.margen)+'%\n';});
    csv+='\nFACTURACIÓN POR VENDEDOR\n';
    csv+='Vendedor'+sep+'Facturas'+sep+'Ingresos'+sep+'Costo'+sep+'Ganancia'+sep+'Margen\n';
    sabanaStats.byVendedor.forEach(v=>{csv+=v.name+sep+v.folios+sep+Math.round(v.ingresos)+sep+Math.round(v.costo)+sep+Math.round(v.ganancia)+sep+Math.round(v.margen)+'%\n';});
    csv+='\nFACTURACIÓN POR CLASE\n';
    csv+='Clase'+sep+'Facturas'+sep+'Ingresos'+sep+'Ganancia'+sep+'Margen\n';
    sabanaStats.byClase.forEach(c=>{csv+=c.name+sep+c.folios+sep+Math.round(c.ingresos)+sep+Math.round(c.ganancia)+sep+Math.round(c.margen)+'%\n';});
    csv+='\nEVOLUCIÓN MENSUAL\n';
    csv+='Mes'+sep+'Facturas'+sep+'Ingresos'+sep+'Ganancia'+sep+'Margen'+sep+'Kilos\n';
    sabanaStats.byMes.forEach(m=>{csv+=mesShort(m.name)+sep+m.folios+sep+Math.round(m.ingresos)+sep+Math.round(m.ganancia)+sep+Math.round(m.margen)+'%'+sep+Math.round(m.kilos)+'\n';});
    csv+='\nTOP 20 CLIENTES\n';
    csv+='Cliente'+sep+'Facturas'+sep+'Ingresos'+sep+'Ganancia'+sep+'Margen\n';
    sabanaStats.byCliente.slice(0,20).forEach(c=>{csv+='"'+c.name+'"'+sep+c.folios+sep+Math.round(c.ingresos)+sep+Math.round(c.ganancia)+sep+Math.round(c.margen)+'%\n';});
  }
  if(ovData.length){
    csv+='\nPIPELINE POR ESTADO\n';
    csv+='Estado'+sep+'OVs'+sep+'Monto'+sep+'Toneladas\n';
    ovStats.byEstado.forEach(e=>{csv+=e.name+sep+e.docs+sep+Math.round(e.importe)+sep+(e.peso/1000).toFixed(1)+'\n';});
  }
  const BOM='\uFEFF';
  const blob=new Blob([BOM+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='reporte_dipisa_'+new Date().toISOString().substring(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
}

function checkReady(){document.getElementById('btnStart').classList.toggle('show',sabanaData.length>0||ovData.length>0);}
document.getElementById('fileSabana').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;sabanaFile=f.name;document.getElementById('fnameSabana').textContent=f.name;document.getElementById('cardSabana').classList.add('loaded');sabanaData=parseSabana(await f.text());checkReady();});
document.getElementById('fileOV').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;ovFile=f.name;document.getElementById('fnameOV').textContent=f.name;document.getElementById('cardOV').classList.add('loaded');ovData=parseOV(await f.text());checkReady();});

function startAnalysis(){
  document.getElementById('uploadScreen').style.display='none';
  document.getElementById('dashboard').style.display='flex';
  if(ovData.length)document.getElementById('navPipeline').style.display='';
  let pills='';
  if(sabanaFile)pills+=`<span class="file-pill green"><span class="dot"></span>${sabanaFile} · ${fmtN(sabanaData.length)} líneas</span>`;
  if(ovFile)pills+=`<span class="file-pill blue"><span class="dot"></span>${ovFile} · ${fmtN(ovData.length)} líneas</span>`;
  document.getElementById('filePills').innerHTML=pills;
  populateFilters();filteredSabana=[...sabanaData];filteredOV=[...ovData];
  sabanaStats=computeSabanaStats(filteredSabana);ovStats=computeOVStats(filteredOV);
  renderTab();
}
</script>
